global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          database: 'milan_telecom'

  - job_name: 'airflow-statsd'
    static_configs:
      - targets: ['airflow-statsd-exporter:9102']
        labels:
          service: 'airflow'
