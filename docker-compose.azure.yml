# docker-compose.azure.yml - Version adaptée pour Azure PostgreSQL
version: '3.8'

x-airflow-common: &airflow-common
  image: ${CI_REGISTRY_IMAGE:-registry.gitlab.com/pfe-billcom/milan-telecom-etl}/airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    #  Connexion à Azure PostgreSQL pour les métadonnées Airflow
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AZURE_DB_HOST}:5432/${AIRFLOW_DB_NAME}?sslmode=require
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_HOST: airflow-statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: 9125
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change-me}
    AIRFLOW_UID: ${AIRFLOW_UID:-50000}
    PYTHONPATH: /opt/airflow/project
    # Connexion à Azure PostgreSQL pour les données métier
    DB_NAME: ${DB_NAME:-milan_telecom}
    DB_USER: ${DB_USER:-telecom_admin}
    DB_PASSWORD: ${DB_PASSWORD}
    DB_HOST: ${AZURE_DB_HOST}  # telecom-db.postgres.database.azure.com
    DB_PORT: "5432"
    DATA_DIR: /opt/airflow/project/data_milan_cdr_kaggle
  volumes:
    - ./dags:/opt/airflow/dags:ro
    - ./src:/opt/airflow/project/src:ro
    - ./main.py:/opt/airflow/project/main.py:ro
    # Pas de volume local pour les données → fetch via SSH dans les DAGs
    - airflow_logs:/opt/airflow/logs
  networks:
    - etl-network
  restart: unless-stopped

services:
  #  Postgres local retiré → on utilise Azure PostgreSQL managé

  airflow-init:
    <<: *airflow-common
    container_name: milan_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        # Attendre que la DB Azure soit accessible
        until pg_isready -h ${AZURE_DB_HOST} -p 5432 -U ${AIRFLOW_DB_USER}; do
          echo "Waiting for Azure PostgreSQL..."
          sleep 2
        done
        
        # Créer la DB airflow_metadata si elle n'existe pas
        python - <<'PY'
        import os, psycopg2
        db_name = os.getenv("AIRFLOW_DB_NAME", "airflow_metadata")
        user = os.getenv("AIRFLOW_DB_USER")
        password = os.getenv("AIRFLOW_DB_PASSWORD")
        host = os.getenv("AZURE_DB_HOST")
        
        # Se connecter à la DB 'postgres' par défaut pour créer la DB cible
        conn = psycopg2.connect(dbname="postgres", user=user, password=password, host=host, port="5432", sslmode="require")
        conn.autocommit = True
        cur = conn.cursor()
        cur.execute("SELECT 1 FROM pg_database WHERE datname = %s", (db_name,))
        if cur.fetchone() is None:
            cur.execute(f'CREATE DATABASE "{db_name}"')
            print(f"✅ Created Airflow metadata database: {db_name}")
        cur.close()
        conn.close()
        PY
        
        # Migrer le schéma Airflow
        airflow db migrate
        
        # Créer l'admin si absent
        if ! airflow users list | grep -q "${AIRFLOW_ADMIN_USER:-admin}"; then
          airflow users create \
            --username ${AIRFLOW_ADMIN_USER:-admin} \
            --firstname Airflow \
            --lastname Admin \
            --role Admin \
            --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} \
            --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
          echo " Admin user created"
        fi
    restart: "no"
    depends_on: []  # Pas de dépendance postgres local

  airflow-webserver:
    <<: *airflow-common
    container_name: milan_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: milan_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-statsd-exporter:
    image: prom/statsd-exporter:v0.26.0
    container_name: milan_airflow_statsd_exporter
    command:
      - "--statsd.listen-udp=:9125"
      - "--web.listen-address=:9102"
    expose:
      - "9102"
      - "9125/udp"
    networks:
      - etl-network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: milan_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@${AZURE_DB_HOST}:5432/${DB_NAME}?sslmode=require"
    ports:
      - "9187:9187"
    networks:
      - etl-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: milan_prometheus_etl
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=3d'
      - '--web.enable-lifecycle'
    ports:
      - "9091:9090"  # Port 9091 pour éviter conflit avec Apps VM
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-etl-data:/prometheus
    networks:
      - etl-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: milan_grafana_etl
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    ports:
      - "3001:3000"  # Port 3001 pour éviter conflit
    volumes:
      - grafana-etl-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - etl-network
    restart: unless-stopped

networks:
  etl-network:
    driver: bridge

volumes:
  airflow_logs:
  prometheus-etl-data:
  grafana-etl-data: