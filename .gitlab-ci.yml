---
# .gitlab-ci.yml - Milan_Telecom_ETL
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.10"

default:
  image: python:${PYTHON_VERSION}-slim

# ─────────────────────────────────────
# ÉTAPE 1: Tests & Validation DAGs
# ─────────────────────────────────────
test-dags:
  stage: test
  before_script:
    - pip install -r requirements.txt
    - >
      pip install
      apache-airflow-providers-ssh
      apache-airflow-providers-postgres
      flake8
      black
  script:
    - >
      flake8 dags/
      --count
      --select=E9,F63,F7,F82
      --show-source
      --statistics
    - black --check dags/
    - >
      for dag in dags/*.py; do
        /bin/python3 -c
        "from airflow.models import DagBag;
        DagBag('$dag', include_examples=False).raise_if_errors()";
      done
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─────────────────────────────────────
# ÉTAPE 2: Build & Push Image Airflow Custom
# ─────────────────────────────────────
build-airflow-image:
  stage: build
  image: docker:27.4.1
  services:
    - name: docker:27.4.1-dind
      command: ["--mtu=1460"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - IMAGE_NAME="$CI_REGISTRY_IMAGE/airflow"
    - docker build -f Dockerfile.airflow -t "$IMAGE_NAME:$CI_COMMIT_SHA" -t "$IMAGE_NAME:latest" .
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHA"
    - docker push "$IMAGE_NAME:latest"
    - echo "Image Airflow poussée: $IMAGE_NAME:latest"

# ─────────────────────────────────────
# ÉTAPE 3: Déploiement sur Azure VM
# ─────────────────────────────────────
deploy-to-azure-vm:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build-airflow-image
  before_script:
    - apk add --no-cache openssh-client curl jq
    - mkdir -p ~/.ssh
    - "echo \"$AZURE_SSH_PRIVATE_KEY\" > ~/.ssh/id_rsa"
    - chmod 600 ~/.ssh/id_rsa
    - "ssh-keyscan -H $AZURE_ETL_VM_IP >> ~/.ssh/known_hosts"
  script:
    - |
      echo "Déploiement ETL sur $AZURE_ETL_VM_IP..."

      # 1. Générer le .env localement pour le synchroniser avec la VM
      printf '%s\n' \
        "CI_REGISTRY_IMAGE=${CI_REGISTRY_IMAGE}" \
        "AZURE_DB_HOST=${AZURE_DB_HOST}" \
        "AIRFLOW_DB_USER=${AIRFLOW_DB_USER}" \
        "AIRFLOW_DB_PASSWORD=${AIRFLOW_DB_PASSWORD}" \
        "AIRFLOW_DB_NAME=airflow_metadata" \
        "DB_USER=${DB_USER}" \
        "DB_PASSWORD=${DB_PASSWORD}" \
        "DB_NAME=milan_telecom" \
        "GRAFANA_PASSWORD=admin" > .env

      # 2. Synchroniser les fichiers du projet
      rsync -avz --delete \
        -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
        dags/ src/ main.py requirements.txt docker-compose.azure.yml \
        prometheus.yml grafana/ .env \
        azureuser@$AZURE_ETL_VM_IP:/home/azureuser/milan-etl/

      # 3. Login Docker Registry sur la VM
      ssh -i ~/.ssh/id_rsa azureuser@$AZURE_ETL_VM_IP \
        "echo \"$CI_REGISTRY_PASSWORD\" | sudo docker login \
        -u \"$CI_REGISTRY_USER\" \
        --password-stdin \"$CI_REGISTRY\""

      # 4. Démarrer/mettre à jour la stack ETL
      ssh -i ~/.ssh/id_rsa azureuser@$AZURE_ETL_VM_IP \
        "cd /home/azureuser/milan-etl && sudo docker compose \
        -f docker-compose.azure.yml pull && \
        sudo docker compose -f docker-compose.azure.yml up -d && \
        sleep 30 && curl -f http://localhost:8080/health || \
        echo 'Airflow webserver not ready yet'"

    - "echo \"Déploiement ETL terminé !\""
    - "echo \"Airflow UI : http://$AZURE_ETL_VM_IP:8080\""
  environment:
    name: production-etl
    url: "http://$AZURE_ETL_VM_IP:8080"
