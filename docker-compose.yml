
x-airflow-common: &airflow-common
  image: milan-telecom-airflow:2.9.3-custom
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-postgres}:${AIRFLOW_DB_PASSWORD:-postgres}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_HOST: airflow-statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: 9125
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change-me-in-env}
    AIRFLOW_UID: ${AIRFLOW_UID:-50000}
    PYTHONPATH: /opt/airflow/project
    DB_NAME: ${DB_NAME:-milan_telecom}
    DB_USER: ${DB_USER:-postgres}
    DB_PASSWORD: ${DB_PASSWORD:-postgres}
    DB_HOST: postgres
    DB_PORT: 5432
    DATA_DIR: /opt/airflow/project/data_milan_cdr_kaggle
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/project/src:ro
    - ./main.py:/opt/airflow/project/main.py:ro
    - ./data_milan_cdr_kaggle:/opt/airflow/project/data_milan_cdr_kaggle:ro
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - etl_network

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: milan_etl_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-milan_telecom}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./volumes/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etl_network

  etl:
    build: .
    container_name: milan_etl_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME:-milan_telecom}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DATA_DIR: /app/data_milan_cdr_kaggle
    volumes:
      - ./data_milan_cdr_kaggle:/app/data_milan_cdr_kaggle:ro
    networks:
      - etl_network

  airflow-init:
    <<: *airflow-common
    container_name: milan_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        python - <<'PY'
        import os
        import psycopg2

        db_name = os.getenv("AIRFLOW_DB_NAME", "airflow")
        user = os.getenv("AIRFLOW_DB_USER", "postgres")
        password = os.getenv("AIRFLOW_DB_PASSWORD", "postgres")
        host = os.getenv("DB_HOST", "postgres")
        port = os.getenv("DB_PORT", "5432")

        conn = psycopg2.connect(dbname="postgres", user=user, password=password, host=host, port=port)
        conn.autocommit = True
        cur = conn.cursor()
        cur.execute("SELECT 1 FROM pg_database WHERE datname = %s", (db_name,))
        if cur.fetchone() is None:
            cur.execute(f'CREATE DATABASE "{db_name}"')
            print(f"Created Airflow metadata database: {db_name}")
        else:
            print(f"Airflow metadata database already exists: {db_name}")
        cur.close()
        conn.close()
        PY

        airflow db migrate

        if ! airflow users list | grep -q "${AIRFLOW_ADMIN_USER:-admin}"; then
          airflow users create \
            --username ${AIRFLOW_ADMIN_USER:-admin} \
            --firstname Airflow \
            --lastname Admin \
            --role Admin \
            --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} \
            --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
        fi
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: milan_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: milan_airflow_scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: milan_airflow_statsd_exporter
    command:
      - "--statsd.listen-udp=:9125"
      - "--web.listen-address=:9102"
    expose:
      - "9102"
      - "9125/udp"
    networks:
      - etl_network
    restart: unless-stopped

  prometheus-init:
    image: busybox:1.36
    container_name: milan_prometheus_init
    command:
      - sh
      - -c
      - |
        chown -R 65534:65534 /prometheus && chmod -R 755 /prometheus
    volumes:
      - ./volumes/prometheus_data:/prometheus
    restart: "no"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: milan_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-milan_telecom}?sslmode=disable"
    command:
      - "--config.file=/etc/postgres_exporter.yml"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./postgres_exporter.yml:/etc/postgres_exporter.yml:ro
    networks:
      - etl_network

  prometheus:
    image: prom/prometheus:latest
    container_name: milan_prometheus
    depends_on:
      prometheus-init:
        condition: service_completed_successfully
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus_data:/prometheus
    networks:
      - etl_network
    restart: unless-stopped

  grafana-renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: milan_grafana_renderer
    ports:
      - "8081:8081"
    networks:
      - etl_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: milan_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - DS_PROMETHEUS=prometheus
      - GF_RENDERING_SERVER_URL=http://grafana-renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    ports:
      - "3000:3000"
    volumes:
      - ./volumes/grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - grafana-renderer
    networks:
      - etl_network
    restart: unless-stopped

networks:
  etl_network:
    driver: bridge

volumes:
  airflow_logs:
